# 매일 02:17 UTC(11:17 KST) — 위키 퀘스트 가이드 30개씩 AI 요약 백필 (전체 ~510개, 2~3주 소요)
name: Quest Guides Backfill

on:
  schedule:
    # schedule 누락이 잦아(2026-06 daily 연속 누락) 주 실행 + 백업을 다중 등록.
    # 이 워크플로우는 "아직 가이드 없는 퀘스트"만 골라 처리하고 끝나면 즉시 종료하므로,
    # 둘 다 떠도 중복 생성이 없다(백로그를 더 빨리 소진할 뿐) → 별도 guard 불필요. 정각은 회피.
    - cron: '17 2 * * *' # 02:17 UTC = 11:17 KST (주 실행)
    - cron: '37 5 * * *' # 05:37 UTC = 14:37 KST (백업)
  workflow_dispatch:

permissions:
  contents: write
  models: read
  actions: write

concurrency:
  group: quest-guides
  cancel-in-progress: false

jobs:
  guides:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 가이드 생성 (하루 30개, 호출 상한 30)
        run: node scripts/generate-quest-guides.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODELS_MAX_CALLS: 30

      - name: 커밋 & 푸시
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d public/data/guides ]; then
            git add public/data/guides
          fi
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "퀘스트 가이드: $(TZ=Asia/Seoul date +%F) 백필"
            git pull --rebase origin main
            git push origin main
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKEN push는 push 트리거를 발화시키지 않으므로 배포를 명시적으로 dispatch
      - name: Pages 재배포 트리거
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main --repo "$GITHUB_REPOSITORY"
