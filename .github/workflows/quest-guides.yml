# 매일 02:17 UTC(11:17 KST) — 위키 퀘스트 가이드 30개씩 AI 요약 백필 (전체 ~510개, 2~3주 소요)
name: Quest Guides Backfill

on:
  schedule:
    # 백필(전체 ~510개)은 2026-07 완료 — 이제 이 cron은 신규 퀘스트(패치/와이프)만 잡는다.
    # 신규는 드물고 하루 놓쳐도 다음 날 잡히므로 cron 1개로 충분. 정각(0분)은 회피.
    # 와이프 직후 대량 백로그가 다시 생기면 시각 분산 cron 다중 등록으로 복원할 것.
    - cron: '17 2 * * *' # 02:17 UTC = 11:17 KST
  workflow_dispatch:

permissions:
  contents: write
  models: read
  actions: write

concurrency:
  group: quest-guides
  cancel-in-progress: false

jobs:
  guides:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 가이드 생성 (하루 30개, 호출 상한 30)
        run: node scripts/generate-quest-guides.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODELS_MAX_CALLS: 30

      - name: 커밋 & 푸시
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d public/data/guides ]; then
            git add public/data/guides
          fi
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "퀘스트 가이드: $(TZ=Asia/Seoul date +%F) 백필"
            # 다른 콘텐츠 워크플로우와 push가 겹치면 non-fast-forward — 재시도로 방어
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              [ "$i" = 3 ] && exit 1
              echo "push 실패(${i}회차) — 5초 후 재시도"; sleep 5
            done
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKEN push는 push 트리거를 발화시키지 않으므로 배포를 명시적으로 dispatch
      - name: Pages 재배포 트리거
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main --repo "$GITHUB_REPOSITORY"
