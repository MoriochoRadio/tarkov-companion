# 스토리 챕터 공략 한국어화 — 수동 실행(dispatch) 전용.
# 챕터는 10개뿐이라 한두 번 실행이면 끝나는 백필 — 매일 돌릴 이유가 없고,
# 일일 무료 호출 한도(50회)를 quest-guides(30)·briefing(~5)과 나눠 써야 해서
# cron은 걸지 않는다. 위키가 크게 바뀌면 redo 입력으로 다시 생성.
name: Story Guides

on:
  workflow_dispatch:
    inputs:
      redo:
        description: '다시 만들 챕터 슬러그 (예: tour) 또는 all'
        required: false
        default: ''

permissions:
  contents: write
  models: read
  actions: write

concurrency:
  group: story-guides
  cancel-in-progress: false

jobs:
  guides:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 스토리 공략 생성 (호출 상한 30)
        run: node scripts/generate-story-guides.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODELS_MAX_CALLS: 30
          REDO: ${{ inputs.redo }}

      - name: 커밋 & 푸시
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d public/data/story-guides ]; then
            git add public/data/story-guides
          fi
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "스토리 공략: $(TZ=Asia/Seoul date +%F) 생성"
            git pull --rebase origin main
            git push origin main
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKEN push는 push 트리거를 발화시키지 않으므로 배포를 명시적으로 dispatch
      - name: Pages 재배포 트리거
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main --repo "$GITHUB_REPOSITORY"
