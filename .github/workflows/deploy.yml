# main에 push될 때마다 빌드해서 GitHub Pages로 배포
# 사용 전제: 리포 Settings → Pages → Source를 "GitHub Actions"로 설정
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Actions 탭에서 수동 실행도 가능

permissions:
  contents: read
  pages: write
  id-token: write

# 배포가 겹치면 마지막 것만 살림
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
